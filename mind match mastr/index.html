<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎮 Smart Memory Challenge</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
    <div class="card login-card shadow-lg text-center p-4">
        <h2 class="mb-3">✨ Smart Life Game</h2>
        <input id="name" class="form-control mb-2" placeholder="Enter Name">
        <input id="phone" class="form-control mb-3" placeholder="Phone Number">
        <button onclick="login()" class="btn btn-success w-100">Start Game</button>
    </div>
</div>

<!-- GAME -->
<div id="gamePage" class="container text-center mt-3" style="display:none;">
    <h1 class="title">🧠 MEMORY CHALLENGE</h1>
    <h4 id="timer" class="badge bg-danger fs-4">⏱ 90</h4>

    <div id="board" class="board"></div>
</div>

<!-- RESULT -->
<div id="resultPage" class="center" style="display:none;">
    <div class="card result-card text-center p-5 shadow-lg">
        <h1 id="resultMsg"></h1>
        <p id="thought"></p>
        <button onclick="startGame()" class="btn btn-primary mt-3">Play Again</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
